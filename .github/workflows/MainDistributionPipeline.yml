#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'build-extensions')
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.1
    with:
      duckdb_version: v1.5.2
      ci_tools_version: v1.5.1
      extension_name: duckdb_delta_sharing
      exclude_archs: "wasm_mvp;wasm_eh;wasm_threads;${{ github.event_name == 'pull_request' && 'linux_amd64;linux_arm64;linux_amd64_musl;linux_arm64_musl;osx_amd64;windows_amd64;windows_arm64;windows_amd64_mingw' || '' }}"

  # code-quality-check: 
  #   name: Code Quality Check
  #   uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.4.3
  #   with:
  #     duckdb_version: v1.4.3
  #     ci_tools_version: v1.4.3
  #     extension_name: duckdb_delta_sharing
  #     format_checks: 'format;tidy'

  upload-to-gar:
    name: Upload Extensions to Google Artifact Registry
    needs: duckdb-stable-build
    runs-on: ubuntu-latest
    if: success()
    env:
      GAR_LOCATION: "us"
      GAR_REPOSITORY: duckdb
      GAR_PACKAGE: delta_sharing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Tar Artifacts
        run: |
          cd artifacts
          tar -czf ../duckdb_delta_sharing_extensions.tar.gz .
      
      - name: Authenticate GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_JSON }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: Upload to prql-dev
        run: |
          gcloud artifacts generic upload \
            --project="prql-dev" \
            --location=${{ env.GAR_LOCATION }} \
            --repository=${{ env.GAR_REPOSITORY }} \
            --package=${{ env.GAR_PACKAGE }} \
            --version=${{ github.sha }} \
            --source=duckdb_delta_sharing_extensions.tar.gz

      - name: Upload to prql-prod (Release)
        if: github.event_name == 'release'
        run: |
          gcloud artifacts generic upload \
            --project="prql-prod" \
            --location=${{ env.GAR_LOCATION }} \
            --repository=${{ env.GAR_REPOSITORY }} \
            --package=${{ env.GAR_PACKAGE }} \
            --version=${{ github.event.release.tag_name }} \
            --source=duckdb_delta_sharing_extensions.tar.gz

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: duckdb_delta_sharing_extensions.tar.gz
