name: Bundled Binary Pipeline
on:
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  build-binaries:
    name: Build Bundled Binaries
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'build-bundled-binary')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux_amd64
            target: release
            skip_pr: true
          - os: ubuntu-24.04-arm
            arch: linux_arm64
            target: release
            skip_pr: true
          - os: macos-latest
            arch: osx_amd64
            target: release
            skip_pr: true
          - os: macos-latest
            arch: osx_arm64
            target: release
            skip_pr: false
          - os: windows-latest
            arch: windows_amd64_mingw
            target: release
            skip_pr: true

    steps:
      - name: Skip if PR and not targeted arch
        if: github.event_name == 'pull_request' && matrix.skip_pr == true
        run: |
          echo "Skipping this target for PR build..."
          exit 0

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Fetch Submodule Tags
        run: git submodule foreach "git fetch origin --tags"

      - name: Setup C++
        if: matrix.os != 'windows-latest'
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y ninja-build libssl-dev libcurl4-openssl-dev
          fi

      - name: Setup vcpkg
        run: |
          git -C ./extension-ci-tools pull origin main

      - name: Build Bundled Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          CORE_EXTENSIONS="httpfs;parquet;json;icu" \
          BUILD_EXTENSIONS="httpfs;parquet;json;icu;duckdb_delta_sharing" \
          VCPKG_BUILD=1 \
          VCPKG_TOOLCHAIN_PATH="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          VCPKG_MANIFEST_DIR="$(pwd)" \
          EXTENSION_STATIC_BUILD=1 \
          OSX_BUILD_ARCH=${{ (matrix.arch == 'osx_amd64' && 'x86_64') || (matrix.arch == 'osx_arm64' && 'arm64') || '' }} \
          VCPKG_TARGET_TRIPLET=${{ (matrix.arch == 'osx_amd64' && 'x64-osx') || (matrix.arch == 'osx_arm64' && 'arm64-osx') || (matrix.arch == 'linux_amd64' && 'x64-linux') || (matrix.arch == 'linux_arm64' && 'arm64-linux') || '' }} \
          make ${{ matrix.target }}
          cmake --build build/${{ matrix.target }} --target duckdb
        env:
          GEN: ninja

      - name: Build Bundled Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Use cmake directly for Windows to ensure correct vcpkg integration
          WORKSPACE_PATH="${GITHUB_WORKSPACE//\\//}"
          mkdir -p build/release
          cmake -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCORE_EXTENSIONS="httpfs;parquet;json;icu" \
            -DBUILD_EXTENSIONS="httpfs;parquet;json;icu" \
            -DEXTENSION_STATIC_BUILD=1 \
            -DVCPKG_BUILD=1 \
            -DVCPKG_MANIFEST_DIR="${WORKSPACE_PATH}" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DDUCKDB_EXTENSION_CONFIGS="${WORKSPACE_PATH}/extension_config.cmake" \
            -S duckdb -B build/release
          cmake --build build/release --target duckdb

      - name: Build ODBC Driver (OSX)
        if: startsWith(matrix.os, 'macos')
        run: |
          if [[ "${{ matrix.arch }}" == "osx_amd64" ]]; then
            curl -sL https://github.com/openlink/iODBC/releases/download/v3.52.16/libiodbc-3.52.16.tar.gz | tar xz
            cd libiodbc-3.52.16
            CFLAGS="-arch x86_64 -arch arm64" LDFLAGS="-arch x86_64 -arch arm64" ./configure --prefix=/tmp/libiodbc --disable-gui
            make -j4
            make install
            cd ..
            export CMAKE_PREFIX_PATH="/tmp/libiodbc"
          else
            brew install libiodbc || true
            export CMAKE_PREFIX_PATH="$(brew --prefix libiodbc)"
          fi
          git clone https://github.com/duckdb/duckdb-odbc.git build/duckdb-odbc
          cd build/duckdb-odbc
          patch -p1 < ../../mac_odbc_fixes.patch
          cat << 'EOF' > patch_static.py
          import os
          workspace = os.path.abspath("../..")
          src_files = [os.path.join(workspace, "src", f) for f in ["delta_share_multi_file_reader.cpp", "delta_sharing_client.cpp", "delta_sharing_json.cpp", "duckdb_delta_sharing_extension.cpp", "duckdb_delta_sharing_functions.cpp"]]
          ext_src = " " + " ".join(src_files)
          inc_dir = os.path.join(workspace, "src", "include")
          
          f='CMakeLists.txt'
          c=open(f).read()
          c=c.replace('cmake_minimum_required(VERSION 3.5...3.29)', 'cmake_minimum_required(VERSION 3.12...3.29)')
          fetch_block = """
include(FetchContent)
FetchContent_Declare(nlohmann_json URL https://github.com/nlohmann/json/releases/download/v3.11.3/json.tar.xz)
FetchContent_MakeAvailable(nlohmann_json)
FetchContent_Declare(roaring GIT_REPOSITORY https://github.com/RoaringBitmap/CRoaring.git GIT_TAG v4.6.1)
FetchContent_MakeAvailable(roaring)
"""
          c=c.replace('add_subdirectory(src)', fetch_block + '\nadd_subdirectory(src)')
          c=c.replace('else()', 'elseif(CMAKE_SYSTEM_NAME STREQUAL "Linux")')
          c=c.replace('-DNO_FRAMEWORKS', '-DNO_FRAMEWORKS -DSQL_ATTR_ASYNC_DBC_FUNCTIONS_ENABLE=117 -DSQL_ASYNC_DBC_FUNCTIONS=10023 -DSQL_ASYNC_DBC_NOT_CAPABLE=0')
          c=c.replace('add_subdirectory(test)', '')
          c=c.replace('add_library(duckdb_core_obj OBJECT ${CORE_OBJECT_FILES})', f'include_directories({inc_dir})\nadd_library(duckdb_core_obj OBJECT ' + '${CORE_OBJECT_FILES}' + f' {ext_src})\ntarget_link_libraries(duckdb_core_obj PRIVATE roaring nlohmann_json::nlohmann_json)')
          c=c.replace('target_link_libraries(duckdb_odbc ${LINK_LIB_LIST} )', 'target_link_libraries(duckdb_odbc ${LINK_LIB_LIST} roaring nlohmann_json::nlohmann_json)')
          open(f,'w').write(c)

          f2='src/duckdb/generated_extension_loader_package_build.cpp'
          c2=open(f2).read()
          c2=c2.replace('#include "duckdb/main/extension/generated_extension_loader.hpp"', f'#include "{inc_dir}/duckdb_delta_sharing_extension.hpp"\n#include "duckdb/main/extension/generated_extension_loader.hpp"')
          c2=c2.replace('return ExtensionLoadResult::NOT_LOADED;', '    if (extension=="duckdb_delta_sharing") {\n        db.LoadStaticExtension<DuckdbDeltaSharingExtension>();\n        return ExtensionLoadResult::LOADED_EXTENSION;\n    }\n    return ExtensionLoadResult::NOT_LOADED;')
          c2=c2.replace('};', '        "duckdb_delta_sharing",\n    };')
          open(f2,'w').write(c2)
          EOF
          python3 vendor.py --duckdb ../../duckdb
          python3 patch_static.py
          mkdir -p build/release
          cd build/release
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ (matrix.arch == 'osx_amd64' && 'x86_64') || (matrix.arch == 'osx_arm64' && 'arm64') || '' }} ../..
          cmake --build . --config Release

      - name: Build ODBC Driver (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          git clone https://github.com/duckdb/duckdb-odbc.git build/duckdb-odbc
          cd build/duckdb-odbc
          cat << 'EOF' > patch.py
          import os
          f='CMakeLists.txt.in'
          c=open(f).read()
          c=c.replace('/bigobj', '-Wa,-mbig-obj')
          c=c.replace('add_subdirectory(winsetup)', '# disabled winsetup')
          c=c.replace('legacy_stdio_definitions', 'ws2_32> $<$<PLATFORM_ID:Windows>:rstrtmgr> $<$<PLATFORM_ID:Windows>:bcrypt> $<$<PLATFORM_ID:Windows>:crypt32')
          open(f,'w').write(c)

          f2='test/CMakeLists.txt'
          if os.path.exists(f2):
              c2=open(f2).read()
              c2=c2.replace('/bigobj', '-Wa,-mbig-obj')
              open(f2,'w').write(c2)
          EOF
          python patch.py
          
          python vendor.py --duckdb ../../duckdb
          python -c "f='src/odbc_driver/common/file_io.cpp'; c=open(f).read(); open(f,'w').write(c.replace('file.open(wpath,', 'file.open(wpath.c_str(),'))"
          mkdir -p build/release
          cd build/release
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" ../..
          cmake --build . --config Release




      - name: Compress Artifacts
        shell: bash
        run: |
          mkdir -p gar_artifacts
          cp build/release/duckdb gar_artifacts/ 2>/dev/null || true
          cp build/release/duckdb.exe gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/libduckdb_odbc.dylib gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/duckdb_odbc.dll gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/duckdb_odbc.lib gar_artifacts/ 2>/dev/null || true
          cd gar_artifacts
          tar -czf ../duckdb-${{ matrix.arch }}.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ matrix.arch }}
          path: gar_artifacts/*

      - name: Upload Compressed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-compressed-${{ matrix.arch }}
          path: duckdb-${{ matrix.arch }}.tar.gz

  bundle-macos-universal:
    name: Create MacOS Universal Binary
    needs: build-binaries
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: duckdb-osx_amd64
          path: bin_x64
      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: duckdb-osx_arm64
          path: bin_arm64
      - name: Create Universal Binary
        run: |
          lipo -create -output duckdb bin_x64/duckdb bin_arm64/duckdb
          chmod +x duckdb
      - name: Upload Universal Binary
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-osx_universal
          path: duckdb

      - name: Compress Artifacts
        run: |
          tar -czf duckdb-osx_universal.tar.gz duckdb

      - name: Upload Compressed Artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-compressed-osx_universal
          path: duckdb-osx_universal.tar.gz

  e2e-test-bundled:
    name: E2E Test (Bundled)
    needs: build-binaries
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: duckdb-linux_amd64
          path: build/release
      - name: Run Bundled E2E Script
        env:
          DELTA_SHARING_ENDPOINT: ${{ secrets.DELTA_SHARING_ENDPOINT }}
          DELTA_SHARING_BEARER_TOKEN: ${{ secrets.DELTA_SHARING_BEARER_TOKEN }}
        run: |
          chmod +x build/release/duckdb
          chmod +x test/integration/run_e2e_bundled_tests.sh
          ./test/integration/run_e2e_bundled_tests.sh

  release-bundled-binaries:
    name: Upload Bundled Binaries to GitHub Release
    needs: [build-binaries, bundle-macos-universal]
    runs-on: ubuntu-latest
    if: always() && needs.build-binaries.result == 'success' && !cancelled()
    steps:
      - name: Download Compressed Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: duckdb-compressed-*
          path: compressed-artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: compressed-artifacts/*.tar.gz
