name: Bundled Binary Pipeline
on:
  release:
    types: [published]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  build-binaries:
    name: Build Bundled Binaries
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'build-bundled-binary')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux_amd64
            target: release
            skip_pr: true
          - os: ubuntu-24.04-arm
            arch: linux_arm64
            target: release
            skip_pr: true
          - os: macos-latest
            arch: osx_amd64
            target: release
            skip_pr: true
          - os: macos-latest
            arch: osx_arm64
            target: release
            skip_pr: false
          - os: windows-latest
            arch: windows_amd64
            target: release
            skip_pr: true

    steps:
      - name: Skip if PR and not targeted arch
        if: github.event_name == 'pull_request' && matrix.skip_pr == true
        run: |
          echo "Skipping this target for PR build..."
          exit 0

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup C++
        if: matrix.os != 'windows-latest'
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y ninja-build libssl-dev libcurl4-openssl-dev
          fi

      - name: Setup vcpkg
        run: |
          git -C ./extension-ci-tools pull origin main

      - name: Build Bundled Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          CORE_EXTENSIONS="httpfs;parquet;json;icu" \
          BUILD_EXTENSIONS="httpfs;parquet;json;icu;duck_delta_share" \
          VCPKG_BUILD=1 \
          VCPKG_TOOLCHAIN_PATH="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          VCPKG_MANIFEST_DIR="$(pwd)" \
          EXTENSION_STATIC_BUILD=1 \
          OSX_BUILD_ARCH=${{ (matrix.arch == 'osx_amd64' && 'x86_64') || (matrix.arch == 'osx_arm64' && 'arm64') || '' }} \
          VCPKG_TARGET_TRIPLET=${{ (matrix.arch == 'osx_amd64' && 'x64-osx') || (matrix.arch == 'osx_arm64' && 'arm64-osx') || (matrix.arch == 'linux_amd64' && 'x64-linux') || (matrix.arch == 'linux_arm64' && 'arm64-linux') || '' }} \
          make ${{ matrix.target }}
        env:
          GEN: ninja

      - name: Build Bundled Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # Use cmake directly for Windows to ensure correct vcpkg integration
          WORKSPACE_PATH="${GITHUB_WORKSPACE//\\//}"
          mkdir -p build/release
          cmake -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCORE_EXTENSIONS="httpfs;parquet;json;icu" \
            -DBUILD_EXTENSIONS="httpfs;parquet;json;icu" \
            -DEXTENSION_STATIC_BUILD=1 \
            -DVCPKG_BUILD=1 \
            -DVCPKG_MANIFEST_DIR="${WORKSPACE_PATH}" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DDUCKDB_EXTENSION_CONFIGS="${WORKSPACE_PATH}/extension_config.cmake" \
            -S duckdb -B build/release
          cmake --build build/release --target duckdb

      - name: Build ODBC Driver (OSX)
        if: startsWith(matrix.os, 'macos')
        run: |
          if [[ "${{ matrix.arch }}" == "osx_amd64" ]]; then
            curl -sL http://www.unixodbc.org/unixODBC-2.3.12.tar.gz | tar xz
            cd unixODBC-2.3.12
            CFLAGS="-arch x86_64 -arch arm64" LDFLAGS="-arch x86_64 -arch arm64" ./configure --prefix=/tmp/unixodbc --disable-gui --disable-drivers
            make -j4
            make install
            cd ..
            export CMAKE_PREFIX_PATH="/tmp/unixodbc"
          else
            brew install unixodbc || true
            export CMAKE_PREFIX_PATH="$(brew --prefix unixodbc)"
          fi
          git clone https://github.com/duckdb/duckdb-odbc.git build/duckdb-odbc
          cd build/duckdb-odbc
          python3 vendor.py --duckdb ../../duckdb
          mkdir -p build/release
          cd build/release
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ (matrix.arch == 'osx_amd64' && 'x86_64') || (matrix.arch == 'osx_arm64' && 'arm64') || '' }} ../..
          cmake --build . --config Release

      - name: Build ODBC Driver (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          git clone https://github.com/duckdb/duckdb-odbc.git build/duckdb-odbc
          cd build/duckdb-odbc
          sed -i 's|/bigobj|-Wa,-mbig-obj|g' CMakeLists.txt.in
          python vendor.py --duckdb ../../duckdb
          sed -i 's|file.open(wpath,|file.open(wpath.c_str(),|g' src/odbc_driver/common/file_io.cpp
          mkdir -p build/release
          cd build/release
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" ../..
          cmake --build . --config Release




      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ matrix.arch }}
          path: |
            build/release/duckdb
            build/release/duckdb.exe
            build/duckdb-odbc/build/release/libduckdb_odbc.dylib
            build/duckdb-odbc/build/release/duckdb_odbc.dll
            build/duckdb-odbc/build/release/duckdb_odbc.lib

      - name: Compress Artifacts
        shell: bash
        run: |
          mkdir -p gar_artifacts
          cp build/release/duckdb gar_artifacts/ 2>/dev/null || true
          cp build/release/duckdb.exe gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/libduckdb_odbc.dylib gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/duckdb_odbc.dll gar_artifacts/ 2>/dev/null || true
          cp build/duckdb-odbc/build/release/duckdb_odbc.lib gar_artifacts/ 2>/dev/null || true
          cd gar_artifacts
          tar -czf ../duckdb-${{ matrix.arch }}.tar.gz .

      - name: Authenticate GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to prql-dev GAR
        run: |
          gcloud artifacts generic upload \
            --project="prql-dev" \
            --location="us" \
            --repository="duckdb" \
            --package="delta_sharing" \
            --version=${{ github.sha }} \
            --source=duckdb-${{ matrix.arch }}.tar.gz

      - name: Upload to prql-prod GAR
        if: github.event_name == 'release'
        run: |
          gcloud artifacts generic upload \
            --project="prql-prod" \
            --location="us" \
            --repository="duckdb" \
            --package="delta_sharing" \
            --version=${{ github.event.release.tag_name }} \
            --source=duckdb-${{ matrix.arch }}.tar.gz

  bundle-macos-universal:
    name: Create MacOS Universal Binary
    needs: build-binaries
    runs-on: macos-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Download x64
        uses: actions/download-artifact@v4
        with:
          name: duckdb-osx_amd64
          path: bin_x64
      - name: Download arm64
        uses: actions/download-artifact@v4
        with:
          name: duckdb-osx_arm64
          path: bin_arm64
      - name: Create Universal Binary
        run: |
          lipo -create -output duckdb bin_x64/duckdb bin_arm64/duckdb
          chmod +x duckdb
      - name: Upload Universal Binary
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-osx_universal
          path: duckdb

      - name: Compress Artifacts
        run: |
          tar -czf duckdb-osx_universal.tar.gz duckdb

      - name: Authenticate GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_ARTIFACT_REGISTRY_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to prql-dev GAR
        run: |
          gcloud artifacts generic upload \
            --project="prql-dev" \
            --location="us" \
            --repository="<YOUR_GAR_REPOSITORY_NAME>" \
            --package="duckdb/delta_sharing" \
            --version=${{ github.sha }} \
            --source=duckdb-osx_universal.tar.gz

      - name: Upload to prql-prod GAR
        if: github.event_name == 'release'
        run: |
          gcloud artifacts generic upload \
            --project="prql-prod" \
            --location="us" \
            --repository="<YOUR_GAR_REPOSITORY_NAME>" \
            --package="duckdb/delta_sharing" \
            --version=${{ github.event.release.tag_name }} \
            --source=duckdb-osx_universal.tar.gz

  e2e-test-bundled:
    name: E2E Test (Bundled)
    needs: build-binaries
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: duckdb-linux_amd64
          path: build/release
      - name: Run Bundled E2E Script
        env:
          DELTA_SHARING_ENDPOINT: ${{ secrets.DELTA_SHARING_ENDPOINT }}
          DELTA_SHARING_BEARER_TOKEN: ${{ secrets.DELTA_SHARING_BEARER_TOKEN }}
        run: |
          chmod +x build/release/duckdb
          chmod +x test/integration/run_e2e_bundled_tests.sh
          ./test/integration/run_e2e_bundled_tests.sh
